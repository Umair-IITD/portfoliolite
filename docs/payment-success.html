<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - PortfolioLite</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #0A0F1E;
      color: #F1F5F9;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(0, 212, 180, 0.08) 0%, transparent 70%);
    }

    .card {
      background: linear-gradient(135deg, #111827 0%, #0f1a2e 100%);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 32px;
      padding: 56px 40px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 32px 64px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 212, 180, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .icon-wrap {
      width: 88px;
      height: 88px;
      background: rgba(0, 212, 180, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      border: 1px solid rgba(0,212,180,0.2);
      box-shadow: 0 0 40px rgba(0,212,180,0.15);
      animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes bounceIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .icon-wrap svg { color: #00D4B4; }

    h1 {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #F1F5F9, #94A3B8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .message-box {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 24px;
      padding: 32px 24px;
      margin-bottom: 32px;
      backdrop-filter: blur(10px);
    }

    .subtitle {
      color: #94A3B8;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .email-highlight {
      color: #F5A623;
      font-weight: 800;
      font-size: 18px;
      display: block;
      margin-top: 12px;
    }

    .btn {
      display: block;
      background: linear-gradient(135deg, #00D4B4, #00B89C);
      color: #0A0F1E;
      text-decoration: none;
      padding: 20px;
      border-radius: 18px;
      font-weight: 900;
      font-size: 16px;
      letter-spacing: -0.2px;
      transition: all 0.2s;
      box-shadow: 0 8px 24px rgba(0,212,180,0.25);
      cursor: pointer;
      border: none;
      width: 100%;
      font-family: inherit;
    }

    .btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 12px 32px rgba(0,212,180,0.35); 
    }
    
    .btn:active { transform: translateY(0); }

    .footer {
      margin-top: 28px;
      font-size: 13px;
      color: #475569;
      line-height: 1.6;
    }

    .footer a { color: #00D4B4; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 6 12 13 2 6"></polyline>
        <path d="M22 6v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6"></path>
      </svg>
    </div>
    <h1>Check Your Email! 📬</h1>
    
    <div class="message-box">
      <p class="subtitle">
        Your payment was successful and your PortfolioLite Pro unlock code has been sent to:
      </p>
      <span class="email-highlight">Your Registered Email</span>
    </div>

    <button class="btn" id="done-btn" onclick="handleDone()">Done — Return to App</button>

    <p class="footer">
      Didn't receive it? Check your spam folder or<br>
      contact us at <a href="mailto:support@portfoliolite.tech">support@portfoliolite.tech</a>
    </p>
  </div>

  <script>
    function handleDone() {
      try { 
        window.location.href = 'portfoliolite://';
      } catch(e) {}
      
      setTimeout(() => {
        const btn = document.getElementById('done-btn');
        btn.innerHTML = 'Switch back to PortfolioLite<br><span style="font-size:12px; font-weight:normal; opacity:0.8;">(or tap here to open)</span>';
        btn.style.background = 'rgba(59,130,246,0.15)';
        btn.style.color = '#93C5FD';
        btn.style.border = '1px solid rgba(59,130,246,0.35)';
        btn.style.boxShadow = 'none';
        btn.onclick = () => { window.location.href = 'portfoliolite://'; };
      }, 500);
    }

    // Capture payment ID just for logging/analytics if needed
    const params = new URLSearchParams(window.location.search);
    const paymentId = params.get('razorpay_payment_id') || params.get('payment_id');
    if (paymentId) console.log('Payment processed:', paymentId);
  </script>
</body>
</html>
