<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - PortfolioLite</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #0A0F1E;
      color: #F1F5F9;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(0, 212, 180, 0.08) 0%, transparent 70%);
    }

    .card {
      background: linear-gradient(135deg, #111827 0%, #0f1a2e 100%);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 28px;
      padding: 44px 36px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 32px 64px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      background: rgba(0, 212, 180, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      border: 1px solid rgba(0,212,180,0.2);
      box-shadow: 0 0 32px rgba(0,212,180,0.15);
    }

    .icon-wrap svg { color: #00D4B4; }

    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #94A3B8;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .code-box {
      background: #070C19;
      border: 2px dashed rgba(59,130,246,0.25);
      border-radius: 18px;
      padding: 24px 20px;
      margin-bottom: 28px;
      position: relative;
    }

    .code-label {
      font-size: 10px;
      font-weight: 800;
      color: #3B82F6;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .code-value {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #F5A623;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .code-value.pending {
      color: #F5A623;
      font-size: 16px;
      letter-spacing: 1px;
      font-weight: 600;
      opacity: 0.8;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .code-value.error-state {
      color: #EF4444;
      font-size: 14px;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .code-value.success {
      color: #F5A623;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.4; }
    }

    .copy-btn {
      display: block;
      margin: 10px auto 0;
      background: none;
      border: 1px solid rgba(245,166,35,0.3);
      color: #F5A623;
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .copy-btn:hover { background: rgba(245,166,35,0.1); }
    .copy-btn.copied { color: #22C55E; border-color: rgba(34,197,94,0.4); }

    .btn {
      display: block;
      background: linear-gradient(135deg, #00D4B4, #00B89C);
      color: #0A0F1E;
      text-decoration: none;
      padding: 18px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.2px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 8px 24px rgba(0,212,180,0.25);
      cursor: pointer;
      border: none;
      width: 100%;
      font-family: inherit;
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(0,212,180,0.35); }
    .btn:active { transform: scale(0.98); }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #475569;
      line-height: 1.6;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(245,166,35,0.3);
      border-top-color: #F5A623;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>Payment Successful! 🎉</h1>
    <p class="subtitle" id="subtitle">Fetching your unlock code...</p>

    <div class="code-box">
      <div class="code-label">Your Unlock Code</div>
      <div class="code-value pending" id="code-display">
        <span class="spinner"></span> Fetching...
      </div>
      <button class="copy-btn" id="copy-btn" style="display:none" onclick="copyCode()">Copy Code</button>
    </div>

    <button class="btn" id="done-btn" onclick="handleDone()">Done — Close Window</button>

    <div id="manual-form" style="display:none; margin-top:16px;">
      <p style="color:#94A3B8; font-size:13px; margin-bottom:8px;">Enter your Razorpay Payment ID manually:</p>
      <input id="manual-pid" type="text" placeholder="pay_xxxxxxxxxxxx"
        style="width:100%; background:#070C19; border:1px solid rgba(255,255,255,0.15); border-radius:10px;
               color:#F1F5F9; padding:10px 14px; font-size:14px; font-family:inherit; outline:none; box-sizing:border-box;">
      <button onclick="lookupManual()" style="margin-top:8px; width:100%; background:rgba(59,130,246,0.15);
        border:1px solid rgba(59,130,246,0.35); color:#93C5FD; border-radius:10px;
        padding:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;">Look Up My Code</button>
    </div>

    <p class="footer">
      Enter this code in PortfolioLite to unlock Pro.<br>
      Your code is also saved to your Razorpay email.
    </p>
  </div>

  <script>
    const SUPABASE_FUNCTION_URL = 'https://sdmmujejnxrzgozpstcp.supabase.co/functions/v1/payment-success';
    let currentCode = null;
    let retryCount = 0;
    let retryTimer = null;

    function handleDone() {
      try { window.close(); } catch(e) {}
      setTimeout(() => {
        const btn = document.getElementById('done-btn');
        btn.textContent = '✓ You can now close this tab';
        btn.style.background = 'rgba(34,197,94,0.15)';
        btn.style.color = '#22C55E';
        btn.style.border = '1px solid rgba(34,197,94,0.35)';
        btn.style.boxShadow = 'none';
        btn.onclick = null;
      }, 300);
    }

    function getPaymentId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('razorpay_payment_id')
          || params.get('payment_id')
          || params.get('razorpay_payment_link_id');
    }

    function showCode(code) {
      currentCode = code;
      const el = document.getElementById('code-display');
      el.className = 'code-value success';
      el.textContent = code;
      document.getElementById('copy-btn').style.display = 'block';
      document.getElementById('subtitle').textContent = 'Thank you for supporting PortfolioLite! Copy the code below and enter it in the app.';
    }

    function showPending(message) {
      const el = document.getElementById('code-display');
      el.className = 'code-value pending';
      el.innerHTML = '<span class="spinner"></span> ' + (message || 'Verifying payment...');
      document.getElementById('subtitle').textContent = 'Your payment was received. Generating your unlock code...';
    }

    function showError(message) {
      const el = document.getElementById('code-display');
      el.className = 'code-value error-state';
      el.textContent = message || 'Unable to fetch code. Contact support.';
      document.getElementById('subtitle').textContent = 'Something went wrong. Please check your email for your code.';
    }

    function copyCode() {
      if (!currentCode) return;
      navigator.clipboard.writeText(currentCode).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy Code';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        // Fallback for older browsers
        const el = document.getElementById('code-display');
        const range = document.createRange();
        range.selectNode(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
      });
    }

    async function fetchCode(paymentId) {
      try {
        // Use mode=api so the edge function returns JSON instead of a redirect
        const res = await fetch(`${SUPABASE_FUNCTION_URL}?razorpay_payment_id=${paymentId}&mode=api`);
        const data = await res.json();

        if (res.ok && data.success && data.code) {
          showCode(data.code);
          return true; // done
        } else if (res.status === 202 || data.error === 'pending') {
          // Webhook still processing, retry
          return false;
        } else {
          showError(data.error === 'missing_payment_id' ? 'Payment ID missing.' : 'Failed to retrieve code.');
          return true; // stop retrying
        }
      } catch (e) {
        console.error('Fetch error:', e);
        if (retryCount > 5) {
          showError('Network error. Please check your email for your code.');
          return true;
        }
        return false;
      }
    }

    function scheduleRetry(paymentId) {
      if (retryCount >= 20) {
        showError('Taking too long. Please email support@portfoliolite.app with your Razorpay receipt.');
        document.getElementById('manual-form').style.display = 'none';
        return;
      }
      const delay = Math.min(2000 + retryCount * 400, 5000);
      retryCount++;
      showPending(`Verifying payment... (${retryCount}/20)`);
      retryTimer = setTimeout(async () => {
        const done = await fetchCode(paymentId);
        if (!done) scheduleRetry(paymentId);
      }, delay);
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const errorFlag = params.get('error');
      const paymentId = getPaymentId();

      if (errorFlag === 'missing_id' || (!paymentId && !errorFlag)) {
        const el = document.getElementById('code-display');
        el.className = 'code-value error-state';
        el.innerHTML = '⚠ ID not received';
        document.getElementById('subtitle').textContent =
          'There was an issue with the payment redirect. Please contact support with your Razorpay payment confirmation email.';
        return;
      }

      if (!paymentId) return;

      showPending('Fetching your code...');
      const done = await fetchCode(paymentId);
      if (done) return;
      scheduleRetry(paymentId);
    }

    init();
  </script>
</body>
</html>
